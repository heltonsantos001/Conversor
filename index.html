<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Imagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Conversor de Imagem</h1>
        <p>Converta suas imagens para diferentes formatos com facilidade.</p>
    </header>

    <div class="container">
        <h2>Selecione e Converta sua Imagem</h2>

        <!-- Botão estilizado para o input de arquivo -->
        <label class="file-input-container">
            Adicionar Arquivo
            <input type="file" id="fileInput" accept="image/*" />
        </label>

        <select id="outputFormat">
            <option value="webp">WebP</option>
            <option value="jpeg">JPEG</option>
            <option value="png">PNG</option>
        </select>

        <button id="convertButton">Converter Imagem</button>

        <p id="status"></p>

        <h3>Imagem Convertida:</h3>
        <div id="imageIcon">🖼️</div>
        <br />
        <a id="downloadButton" href="#" download="imagem-convertida.webp" style="display: none;">Baixar Imagem Convertida</a>
        <img id="convertedImage" alt="Imagem convertida aparecerá aqui" style="display: none;" />
    </div>

    <footer>
        <p>Criado por Helton Santos</p>
    </footer>

    <script src="script.js"></script>  <!-- Importa o JavaScript -->
</body>
</html>
